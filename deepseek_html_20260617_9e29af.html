<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudVault — Secure File Storage</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           CSS VARIABLES & RESET
        ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-input: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.12);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-full: 9999px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --accent-gradient: linear-gradient(135deg, #4f46e5, #7c3aed);
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --header-height: 64px;
            --sidebar-width: 260px;
        }

        /* Dark theme */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.5);
            --accent-light: #312e81;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* ============================================================
           AUTH SCREEN
        ============================================================ */
        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s, transform 0.4s;
        }
        .auth-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
        }
        .auth-box {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }
        .auth-box .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .auth-box .logo .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--accent-gradient);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
        }
        .auth-box .logo h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .auth-box .logo h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-box .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .auth-box .form-group {
            margin-bottom: 16px;
        }
        .auth-box .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .auth-box .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font);
            background: var(--bg-input);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }
        .auth-box .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
        .auth-box .auth-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .auth-box .auth-actions button {
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            font-family: var(--font);
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }
        .auth-box .auth-actions .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
        }
        .auth-box .auth-actions .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .auth-box .auth-actions .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-box .auth-actions .btn-secondary {
            background: transparent;
            color: var(--accent);
            font-weight: 500;
        }
        .auth-box .auth-actions .btn-secondary:hover {
            background: var(--accent-light);
        }
        .auth-box .auth-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        .auth-box .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .auth-box .auth-divider::before,
        .auth-box .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .auth-box .auth-toggle {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 12px;
        }
        .auth-box .auth-toggle a {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .auth-box .auth-toggle a:hover {
            text-decoration: underline;
        }

        /* ============================================================
           SIDEBAR
        ============================================================ */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            height: 100vh;
            position: sticky;
            top: 0;
            z-index: 10;
            transition: transform 0.3s ease, background 0.3s, border 0.3s;
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 6px;
            margin-bottom: 20px;
        }
        .sidebar-brand .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--accent-gradient);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
        }
        .sidebar-brand h1 {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .sidebar-brand h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }
        .sidebar-user .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }
        .sidebar-user .user-info {
            flex: 1;
            min-width: 0;
        }
        .sidebar-user .user-info .name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-user .user-info .email {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-user .logout-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            padding: 4px;
            transition: var(--transition);
            border-radius: 4px;
        }
        .sidebar-user .logout-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .sidebar-storage {
            background: var(--accent-light);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 18px;
        }
        .sidebar-storage .storage-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .sidebar-storage .storage-bar {
            margin-top: 6px;
            height: 4px;
            background: rgba(79, 70, 229, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .sidebar-storage .storage-bar .fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 2px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 18px;
        }
        .sidebar-actions button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            width: 100%;
            text-align: left;
        }
        .sidebar-actions button i {
            width: 18px;
            font-size: 15px;
            color: var(--text-muted);
        }
        .sidebar-actions button:hover {
            background: var(--bg-hover);
        }
        .sidebar-actions button.primary {
            background: var(--accent-gradient);
            color: #fff;
            justify-content: center;
            font-weight: 600;
            padding: 12px;
        }
        .sidebar-actions button.primary i {
            color: #fff;
        }
        .sidebar-actions button.primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: var(--font);
        }
        .sidebar-nav .nav-item i {
            width: 18px;
            font-size: 15px;
        }
        .sidebar-nav .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar-nav .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 600;
        }
        .sidebar-nav .nav-item.active i {
            color: var(--accent);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-footer .theme-toggle {
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
        }
        .sidebar-footer .theme-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* ============================================================
           MAIN CONTENT
        ============================================================ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
            transition: background 0.3s;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            gap: 12px;
            min-height: var(--header-height);
            transition: background 0.3s, border 0.3s;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }
        .hamburger {
            display: none;
            border: none;
            background: transparent;
            font-size: 20px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
        }
        .topbar-left .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            flex-wrap: wrap;
            overflow: hidden;
        }
        .topbar-left .breadcrumb .sep {
            color: var(--text-muted);
            font-size: 10px;
        }
        .topbar-left .breadcrumb .crumb {
            cursor: pointer;
            transition: var(--transition);
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .topbar-left .breadcrumb .crumb:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .topbar-left .breadcrumb .crumb.current {
            color: var(--text-primary);
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .topbar-right .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .topbar-right .search-wrap i {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .topbar-right .search-wrap input {
            padding: 7px 14px 7px 36px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-family: var(--font);
            background: var(--bg-input);
            color: var(--text-primary);
            width: 180px;
            transition: var(--transition);
            outline: none;
        }
        .topbar-right .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
            width: 220px;
        }
        .topbar-right .view-toggle {
            display: flex;
            gap: 3px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 3px;
            border: 1px solid var(--border-color);
        }
        .topbar-right .view-toggle button {
            border: none;
            background: transparent;
            padding: 5px 9px;
            border-radius: 5px;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            font-size: 13px;
        }
        .topbar-right .view-toggle button.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }
        .topbar-right .view-toggle button:hover {
            color: var(--text-primary);
        }

        /* File area */
        .file-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px 40px;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 320px;
            text-align: center;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 72px;
            color: var(--border-color);
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 380px;
            line-height: 1.6;
        }
        .empty-state .empty-actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .empty-state .empty-actions button {
            padding: 10px 22px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            font-family: var(--font);
            cursor: pointer;
            transition: var(--transition);
        }
        .empty-state .empty-actions .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
        }
        .empty-state .empty-actions .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .empty-state .empty-actions .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .empty-state .empty-actions .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* ============================================================
           FILE GRID
        ============================================================ */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 14px;
        }
        .file-grid.list-view {
            grid-template-columns: 1fr;
            gap: 4px;
        }

        .file-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 18px 14px 14px;
            transition: var(--transition);
            cursor: default;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 150px;
        }
        .file-card:hover {
            box-shadow: var(--shadow-md);
            border-color: transparent;
            transform: translateY(-3px);
        }
        .file-card .file-icon {
            font-size: 38px;
            margin-bottom: 8px;
            color: var(--accent);
            line-height: 1;
        }
        .file-card .file-icon.folder {
            color: #f59e0b;
        }
        .file-card .file-icon.image {
            color: #8b5cf6;
        }
        .file-card .file-icon.pdf {
            color: #ef4444;
        }
        .file-card .file-icon.video {
            color: #ec4899;
        }
        .file-card .file-icon.audio {
            color: #14b8a6;
        }
        .file-card .file-icon.code {
            color: #3b82f6;
        }
        .file-card .file-icon.archive {
            color: #f97316;
        }

        .file-card .file-name {
            font-size: 13px;
            font-weight: 500;
            word-break: break-word;
            line-height: 1.3;
            max-width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .file-card .file-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .file-card .file-actions {
            margin-top: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: var(--transition);
        }
        .file-card:hover .file-actions {
            opacity: 1;
        }
        .file-card .file-actions button {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 6px;
            background: var(--bg-hover);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-card .file-actions button:hover {
            background: var(--accent-light);
            color: var(--accent);
        }
        .file-card .file-actions button.danger:hover {
            background: #fef2f2;
            color: var(--danger);
        }

        /* List view */
        .file-grid.list-view .file-card {
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding: 8px 14px;
            min-height: auto;
            gap: 12px;
            border-radius: var(--radius-sm);
        }
        .file-grid.list-view .file-card .file-icon {
            font-size: 26px;
            margin-bottom: 0;
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }
        .file-grid.list-view .file-card .file-name {
            flex: 1;
            -webkit-line-clamp: 1;
            font-size: 13px;
        }
        .file-grid.list-view .file-card .file-meta {
            margin-top: 0;
            flex-shrink: 0;
            font-size: 12px;
            gap: 12px;
        }
        .file-grid.list-view .file-card .file-actions {
            opacity: 1;
            margin-top: 0;
            flex-shrink: 0;
        }
        .file-grid.list-view .file-card:hover {
            transform: none;
            background: var(--bg-hover);
        }

        /* ============================================================
           MODALS
        ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .modal .modal-header h2 {
            font-size: 19px;
            font-weight: 600;
        }
        .modal .modal-header .close-btn {
            border: none;
            background: transparent;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
            border-radius: 6px;
            line-height: 1;
        }
        .modal .modal-header .close-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal label {
            font-size: 13px;
            font-weight: 500;
            display: block;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .modal input[type="text"],
        .modal input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font);
            transition: var(--transition);
            outline: none;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .modal input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .modal .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-sm);
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
            background: var(--bg-input);
        }
        .modal .drop-zone:hover,
        .modal .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .modal .drop-zone i {
            font-size: 36px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .modal .drop-zone p {
            color: var(--text-secondary);
            font-size: 13px;
        }
        .modal .drop-zone .browse {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }
        .modal .drop-zone input[type="file"] {
            display: none;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            justify-content: flex-end;
        }
        .modal .modal-actions button {
            padding: 9px 22px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            font-family: var(--font);
            cursor: pointer;
            transition: var(--transition);
        }
        .modal .modal-actions .btn-cancel {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }
        .modal .modal-actions .btn-cancel:hover {
            background: #e2e8f0;
        }
        .modal .modal-actions .btn-confirm {
            background: var(--accent-gradient);
            color: #fff;
        }
        .modal .modal-actions .btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .modal .modal-actions .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .upload-progress {
            margin-top: 14px;
            display: none;
        }
        .upload-progress.show {
            display: block;
        }
        .upload-progress .progress-bar {
            height: 5px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        .upload-progress .progress-bar .fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .upload-progress .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* ============================================================
           TOASTS
        ============================================================ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 360px;
            width: 100%;
        }
        .toast {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideInRight 0.3s ease;
            font-size: 13px;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        .toast.success {
            border-left-color: var(--success);
        }
        .toast i {
            font-size: 16px;
            color: var(--accent);
            flex-shrink: 0;
        }
        .toast.error i {
            color: var(--danger);
        }
        .toast.success i {
            color: var(--success);
        }
        .toast .toast-close {
            margin-left: auto;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
        }

        /* ============================================================
           ANIMATIONS
        ============================================================ */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(24px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes slideInRight {
            from {
                transform: translateX(40px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 820px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                width: 280px;
                box-shadow: var(--shadow-lg);
                z-index: 50;
                border-right: none;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 40;
                backdrop-filter: blur(2px);
            }
            .sidebar-overlay.open {
                display: block;
            }
            .hamburger {
                display: flex !important;
            }
            .topbar {
                padding: 10px 16px;
            }
            .file-area {
                padding: 16px;
            }
            .topbar-right .search-wrap input {
                width: 130px;
            }
            .topbar-right .search-wrap input:focus {
                width: 150px;
            }
            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .modal {
                padding: 24px 20px;
                margin: 12px;
            }
            .auth-box {
                padding: 28px 20px;
            }
        }

        @media (max-width: 500px) {
            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
            .topbar-left .breadcrumb {
                font-size: 12px;
            }
            .topbar-right .search-wrap input {
                width: 90px;
                padding: 5px 10px 5px 30px;
                font-size: 12px;
            }
            .topbar-right .search-wrap input:focus {
                width: 110px;
            }
            .topbar-right .view-toggle button {
                padding: 4px 6px;
                font-size: 12px;
            }
            .file-grid.list-view .file-card .file-meta {
                display: none;
            }
            .file-grid.list-view .file-card .file-actions button {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }
            .auth-box .logo h1 {
                font-size: 20px;
            }
        }

        /* Sidebar overlay fix */
        .sidebar-overlay {
            display: none;
        }
        .sidebar-overlay.open {
            display: block;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn-primary .spinner {
            width: 16px;
            height: 16px;
            border-width: 2px;
        }
    </style>
</head>
<body>

    <!-- ============================================================

    ============================================================ -->

    <!-- ============================================================
    JAVASCRIPT — Fully Local, No Firebase
    ============================================================ -->
    <script>
        // ================================================================
        //  CONFIG
        // ================================================================
        const MAX_STORAGE = 10 * 1024 * 1024 * 1024; // 10 GB
        const STATE_KEY = 'cloudvault_data_';
        const USERS_KEY = 'cloudvault_users';

        // ================================================================
        //  STATE
        // ================================================================
        let state = {
            files: [],
            folders: [],
            currentPath: '',
            viewMode: 'grid',
            filterType: 'all',
            searchQuery: '',
        };

        let currentUser = null; // { username, displayName }
        let uploadInProgress = false;
        let uploadedFiles = [];

        // ================================================================
        //  DOM REFS
        // ================================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const fileContainer = $('#fileContainer');
        const breadcrumb = $('#breadcrumb');
        const searchInput = $('#searchInput');
        const storageText = $('#storageText');
        const storageFill = $('#storageFill');
        const sidebar = $('#sidebar');
        const sidebarOverlay = $('#sidebarOverlay');
        const hamburgerBtn = $('#hamburgerBtn');

        // Auth
        const authScreen = $('#authScreen');
        const authUsername = $('#authUsername');
        const authPassword = $('#authPassword');
        const authSubmitBtn = $('#authSubmitBtn');
        const authBtnText = $('#authBtnText');
        const authToggleBtn = $('#authToggleBtn');
        const authError = $('#authError');
        const authSubtitle = $('#authSubtitle');
        const authGuestBtn = $('#authGuestBtn');
        let isLoginMode = true;

        // User
        const userAvatar = $('#userAvatar');
        const userName = $('#userName');
        const userEmail = $('#userEmail');
        const logoutBtn = $('#logoutBtn');

        // Modals
        const uploadModal = $('#uploadModal');
        const closeUploadModal = $('#closeUploadModal');
        const dropZone = $('#dropZone');
        const fileInput = $('#fileInput');
        const uploadProgress = $('#uploadProgress');
        const progressFill = $('#progressFill');
        const progressLabel = $('#progressLabel');
        const progressPercent = $('#progressPercent');
        const cancelUploadBtn = $('#cancelUploadBtn');

        const folderModal = $('#folderModal');
        const closeFolderModal = $('#closeFolderModal');
        const folderNameInput = $('#folderNameInput');
        const createFolderBtn = $('#createFolderBtn');
        const cancelFolderBtn = $('#cancelFolderBtn');

        const toastContainer = $('#toastContainer');
        const themeToggle = $('#themeToggle');

        // ================================================================
        //  HELPERS
        // ================================================================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            const val = (bytes / Math.pow(k, i)).toFixed(i > 0 ? 1 : 0);
            return val + ' ' + sizes[i];
        }

        function getFileIcon(file) {
            if (file.type === 'folder') return 'fas fa-folder folder';
            const ext = file.name.split('.').pop().toLowerCase();
            const mime = file.mimeType || '';
            if (mime.startsWith('image/') || ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp', 'ico'].includes(ext)) {
                return 'fas fa-file-image image';
            }
            if (mime === 'application/pdf' || ext === 'pdf') return 'fas fa-file-pdf pdf';
            if (mime.startsWith('video/') || ['mp4', 'avi', 'mov', 'mkv', 'webm', 'flv'].includes(ext)) {
                return 'fas fa-file-video video';
            }
            if (mime.startsWith('audio/') || ['mp3', 'wav', 'flac', 'aac', 'ogg'].includes(ext)) {
                return 'fas fa-file-audio audio';
            }
            if (['zip', 'rar', '7z', 'tar', 'gz', 'bz2'].includes(ext)) return 'fas fa-file-archive archive';
            if (['js', 'ts', 'py', 'java', 'c', 'cpp', 'h', 'html', 'css', 'json', 'xml', 'yaml', 'toml', 'sh', 'rb', 'go',
                    'rs'
                ].includes(ext)) {
                return 'fas fa-file-code code';
            }
            if (['doc', 'docx', 'odt'].includes(ext)) return 'fas fa-file-word';
            if (['xls', 'xlsx', 'csv', 'ods'].includes(ext)) return 'fas fa-file-excel';
            if (['ppt', 'pptx'].includes(ext)) return 'fas fa-file-powerpoint';
            if (['txt', 'log', 'md'].includes(ext)) return 'fas fa-file-alt';
            return 'fas fa-file';
        }

        function getFileTypeCategory(file) {
            if (file.type === 'folder') return 'folder';
            const mime = file.mimeType || '';
            const ext = file.name.split('.').pop().toLowerCase();
            if (mime.startsWith('image/') || ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp'].includes(ext)) return 'images';
            if (mime === 'application/pdf' || ['doc', 'docx', 'txt', 'md', 'odt', 'xls', 'xlsx', 'csv', 'ppt', 'pptx'].includes(
                    ext)) return 'documents';
            if (['zip', 'rar', '7z', 'tar', 'gz', 'bz2'].includes(ext)) return 'archives';
            return 'other';
        }

        function getTotalSize() {
            let total = 0;
            state.files.forEach(f => { if (f.type !== 'folder') total += f.size || 0; });
            return total;
        }

        function getStoragePercent() {
            return Math.min((getTotalSize() / MAX_STORAGE) * 100, 100);
        }

        function getCurrentItems() {
            let items = [];
            state.folders.forEach(f => {
                if (f.parent === state.currentPath) {
                    items.push({ ...f, type: 'folder' });
                }
            });
            state.files.forEach(f => {
                if (f.folder === state.currentPath && f.type !== 'folder') {
                    items.push({ ...f });
                }
            });

            if (state.filterType !== 'all') {
                items = items.filter(item => {
                    if (item.type === 'folder') return true;
                    return getFileTypeCategory(item) === state.filterType;
                });
            }

            if (state.searchQuery.trim()) {
                const q = state.searchQuery.trim().toLowerCase();
                items = items.filter(item => item.name.toLowerCase().includes(q));
            }

            items.sort((a, b) => {
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                return a.name.localeCompare(b.name);
            });

            return items;
        }

        function getDataKey() {
            if (currentUser) {
                return STATE_KEY + currentUser.username;
            }
            return STATE_KEY + 'guest';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ================================================================
        //  PERSISTENCE (localStorage)
        // ================================================================
        function saveState() {
            try {
                const key = getDataKey();
                const data = {
                    files: state.files,
                    folders: state.folders,
                    currentPath: state.currentPath,
                };
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                toast('Failed to save state. Storage may be full.', 'error');
            }
        }

        function loadState() {
            try {
                const key = getDataKey();
                const raw = localStorage.getItem(key);
                if (raw) {
                    const data = JSON.parse(raw);
                    state.files = data.files || [];
                    state.folders = data.folders || [];
                    state.currentPath = data.currentPath || '';
                } else {
                    // New user, start fresh
                    state.files = [];
                    state.folders = [];
                    state.currentPath = '';
                }
            } catch (e) {
                console.warn('Failed to load state', e);
                state.files = [];
                state.folders = [];
                state.currentPath = '';
            }
        }

        // ================================================================
        //  USER MANAGEMENT (local)
        // ================================================================
        function getUsers() {
            try {
                const raw = localStorage.getItem(USERS_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) {
                return {};
            }
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function registerUser(username, password) {
            const users = getUsers();
            if (users[username]) {
                return { success: false, message: 'Username already exists.' };
            }
            if (username.length < 3) {
                return { success: false, message: 'Username must be at least 3 characters.' };
            }
            if (password.length < 4) {
                return { success: false, message: 'Password must be at least 4 characters.' };
            }
            users[username] = { password, displayName: username };
            saveUsers(users);
            return { success: true };
        }

        function loginUser(username, password) {
            const users = getUsers();
            const user = users[username];
            if (!user) {
                return { success: false, message: 'User not found.' };
            }
            if (user.password !== password) {
                return { success: false, message: 'Incorrect password.' };
            }
            return { success: true, user: { username, displayName: user.displayName || username } };
        }

        // ================================================================
        //  AUTH UI
        // ================================================================
        function setAuthState(user) {
            if (user) {
                currentUser = user;
                localStorage.setItem('cloudvault_session', JSON.stringify(user));
            } else {
                currentUser = null;
                localStorage.removeItem('cloudvault_session');
            }
            updateUserUI();
            loadState();
            render();
            toggleAuthScreen(false);
        }

        function updateUserUI() {
            if (currentUser) {
                const name = currentUser.displayName || currentUser.username;
                userAvatar.textContent = name.charAt(0).toUpperCase();
                userName.textContent = name;
                userEmail.textContent = currentUser.username + (currentUser.isGuest ? ' (guest)' : '');
            } else {
                userAvatar.textContent = '?';
                userName.textContent = 'Not signed in';
                userEmail.textContent = '—';
            }
        }

        function toggleAuthScreen(show) {
            if (show) {
                authScreen.classList.remove('hidden');
            } else {
                authScreen.classList.add('hidden');
            }
        }

        function handleAuthError(msg) {
            authError.textContent = msg;
            authSubmitBtn.disabled = false;
            authBtnText.textContent = isLoginMode ? 'Sign In' : 'Create Account';
        }

        function handleAuthSubmit() {
            const username = authUsername.value.trim();
            const password = authPassword.value.trim();

            if (!username || !password) {
                authError.textContent = 'Please fill in all fields.';
                return;
            }

            authSubmitBtn.disabled = true;
            authBtnText.innerHTML = '<span class="spinner"></span>';

            try {
                let result;
                if (isLoginMode) {
                    result = loginUser(username, password);
                } else {
                    result = registerUser(username, password);
                }

                if (result.success) {
                    if (isLoginMode) {
                        setAuthState(result.user);
                        toast('Welcome back!', 'success');
                    } else {
                        // After registration, auto-login
                        const loginResult = loginUser(username, password);
                        if (loginResult.success) {
                            setAuthState(loginResult.user);
                            toast('Account created! Welcome to CloudVault.', 'success');
                        }
                    }
                } else {
                    handleAuthError(result.message);
                }
            } catch (err) {
                handleAuthError('An error occurred. Please try again.');
                console.error(err);
            }
        }

        function handleGuestLogin() {
            const guestUser = {
                username: 'guest_' + Date.now().toString(36),
                displayName: 'Guest',
                isGuest: true,
            };
            setAuthState(guestUser);
            toast('Welcome, Guest! Files are stored locally.', 'info');
        }

        function handleLogout() {
            setAuthState(null);
            toggleAuthScreen(true);
            toast('Signed out.', 'info');
        }

        // ================================================================
        //  UPLOAD
        // ================================================================
        function uploadFiles(fileList) {
            if (uploadInProgress) return;
            const files = Array.from(fileList);
            if (files.length === 0) return;

            // Check storage
            const totalSize = files.reduce((sum, f) => sum + f.size, 0);
            if (getTotalSize() + totalSize > MAX_STORAGE) {
                toast('Not enough storage space. Free up some space.', 'error');
                return;
            }

            uploadInProgress = true;
            uploadedFiles = [];
            uploadProgress.classList.add('show');
            cancelUploadBtn.disabled = false;

            let completed = 0;
            const total = files.length;

            function updateProgress() {
                const pct = Math.round((completed / total) * 100);
                progressFill.style.width = `${pct}%`;
                progressPercent.textContent = `${pct}%`;
                progressLabel.textContent = `Uploading ${completed}/${total} files...`;
            }

            function processNext() {
                if (uploadedFiles.length >= total) {
                    // Done
                    uploadInProgress = false;
                    uploadProgress.classList.remove('show');
                    progressFill.style.width = '0%';
                    progressPercent.textContent = '0%';
                    progressLabel.textContent = 'Uploading...';
                    cancelUploadBtn.disabled = true;

                    // Add files to state
                    let added = 0;
                    for (const f of uploadedFiles) {
                        state.files.push(f);
                        added++;
                    }
                    saveState();
                    render();
                    toast(`Uploaded ${added} file${added > 1 ? 's' : ''}.`, 'success');
                    closeUploadModalHandler();
                    uploadedFiles = [];
                    return;
                }

                const file = files[uploadedFiles.length];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    const fileObj = {
                        id: generateId(),
                        name: file.name,
                        type: 'file',
                        size: file.size,
                        data: dataUrl,
                        folder: state.currentPath,
                        uploadedAt: Date.now(),
                        mimeType: file.type || '',
                    };
                    uploadedFiles.push(fileObj);
                    completed++;
                    updateProgress();
                    processNext();
                };
                reader.onerror = function() {
                    toast(`Failed to read file: ${file.name}`, 'error');
                    completed++;
                    updateProgress();
                    processNext();
                };
                reader.readAsDataURL(file);
            }

            processNext();
        }

        // ================================================================
        //  DOWNLOAD
        // ================================================================
        function downloadFile(fileId) {
            const file = state.files.find(f => f.id === fileId);
            if (!file || file.type === 'folder') {
                toast('File not found.', 'error');
                return;
            }

            try {
                const a = document.createElement('a');
                a.href = file.data;
                a.download = file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (e) {
                toast('Failed to download file.', 'error');
            }
        }

        // ================================================================
        //  DELETE
        // ================================================================
        function deleteItem(id, type) {
            const name = type === 'folder' ?
                state.folders.find(f => f.id === id)?.name :
                state.files.find(f => f.id === id)?.name;

            if (!confirm(`Delete "${name || 'item'}" permanently?`)) return;

            if (type === 'folder') {
                const toDelete = [id];
                const queue = [id];
                while (queue.length) {
                    const parent = queue.shift();
                    const children = state.folders.filter(f => f.parent === parent);
                    children.forEach(c => {
                        toDelete.push(c.id);
                        queue.push(c.id);
                    });
                }
                state.folders = state.folders.filter(f => !toDelete.includes(f.id));
                state.files = state.files.filter(f => !toDelete.includes(f.folder));
                if (toDelete.includes(state.currentPath)) {
                    state.currentPath = '';
                }
                toast(`Folder "${name}" deleted.`, 'success');
            } else {
                state.files = state.files.filter(f => f.id !== id);
                toast(`File "${name}" deleted.`, 'success');
            }

            saveState();
            render();
        }

        // ================================================================
        //  FOLDER OPERATIONS
        // ================================================================
        function createFolder(name) {
            if (!name.trim()) {
                toast('Please enter a folder name.', 'error');
                return false;
            }
            const exists = state.folders.some(f => f.parent === state.currentPath && f.name === name.trim());
            if (exists) {
                toast('A folder with this name already exists.', 'error');
                return false;
            }
            const folder = {
                id: generateId(),
                name: name.trim(),
                parent: state.currentPath,
            };
            state.folders.push(folder);
            saveState();
            render();
            toast(`Folder "${folder.name}" created.`, 'success');
            return true;
        }

        function navigateToFolder(folderId) {
            state.currentPath = folderId || '';
            saveState();
            render();
            closeSidebar();
        }

        // ================================================================
        //  RENDER
        // ================================================================
        function render() {
            const items = getCurrentItems();
            const container = fileContainer;

            if (items.length === 0 && state.searchQuery.trim() === '' && state.filterType === 'all') {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                        <h3>Your vault is empty</h3>
                        <p>Upload files or create folders to start organizing your data securely.</p>
                        <div class="empty-actions">
                            <button class="btn-primary" id="emptyUploadBtn"><i class="fas fa-plus"></i> Upload Files</button>
                            <button class="btn-secondary" id="emptyFolderBtn"><i class="fas fa-folder-plus"></i> New Folder</button>
                        </div>
                    </div>
                `;
                document.getElementById('emptyUploadBtn')?.addEventListener('click', openUploadModal);
                document.getElementById('emptyFolderBtn')?.addEventListener('click', openFolderModal);
            } else if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="min-height:200px;">
                        <div class="empty-icon" style="font-size:48px;"><i class="fas fa-search"></i></div>
                        <h3>No results found</h3>
                        <p>Try adjusting your search or filter.</p>
                    </div>
                `;
            } else {
                const isList = state.viewMode === 'list';
                const gridClass = isList ? 'file-grid list-view' : 'file-grid';
                let html = `<div class="${gridClass}">`;

                items.forEach(item => {
                    const isFolder = item.type === 'folder';
                    const icon = isFolder ? 'fas fa-folder folder' : getFileIcon(item);
                    const size = isFolder ? '' : formatSize(item.size || 0);
                    const date = isFolder ? '' : new Date(item.uploadedAt || Date.now()).toLocaleDateString();
                    const name = item.name;

                    html += `
                        <div class="file-card" data-id="${item.id}" data-type="${isFolder ? 'folder' : 'file'}">
                            <div class="file-icon ${icon}"></div>
                            <div class="file-name">${escapeHtml(name)}</div>
                            <div class="file-meta">
                                ${isFolder ? '' : `<span>${size}</span>`}
                                ${isFolder ? '' : `<span>${date}</span>`}
                            </div>
                            <div class="file-actions">
                                ${isFolder ? `
                                    <button class="folder-open" title="Open"><i class="fas fa-folder-open"></i></button>
                                ` : `
                                    <button class="file-download" title="Download"><i class="fas fa-download"></i></button>
                                `}
                                <button class="file-delete ${isFolder ? 'danger' : ''}" title="Delete"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                container.innerHTML = html;

                // Attach events
                container.querySelectorAll('.file-card').forEach(card => {
                    const id = card.dataset.id;
                    const type = card.dataset.type;

                    const openBtn = card.querySelector('.folder-open');
                    if (openBtn) {
                        openBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            navigateToFolder(id);
                        });
                    }

                    if (type === 'folder') {
                        card.addEventListener('dblclick', () => navigateToFolder(id));
                    }

                    const dlBtn = card.querySelector('.file-download');
                    if (dlBtn) {
                        dlBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            downloadFile(id);
                        });
                    }

                    const delBtn = card.querySelector('.file-delete');
                    if (delBtn) {
                        delBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            deleteItem(id, type);
                        });
                    }
                });
            }

            renderBreadcrumb();
            updateStorage();
            updateViewToggle();
        }

        function renderBreadcrumb() {
            const pathParts = [];
            let current = state.currentPath;

            while (current) {
                const folder = state.folders.find(f => f.id === current);
                if (folder) {
                    pathParts.unshift({ id: folder.id, name: folder.name });
                    current = folder.parent;
                } else {
                    break;
                }
            }

            let html =
                `<span class="crumb ${state.currentPath === '' ? 'current' : ''}" data-path="">My Drive</span>`;
            pathParts.forEach((part, idx) => {
                const isLast = idx === pathParts.length - 1;
                html += `<span class="sep"><i class="fas fa-chevron-right" style="font-size:9px;"></i></span>`;
                html +=
                    `<span class="crumb ${isLast ? 'current' : ''}" data-path="${part.id}">${escapeHtml(part.name)}</span>`;
            });

            breadcrumb.innerHTML = html;
            breadcrumb.querySelectorAll('.crumb').forEach(el => {
                el.addEventListener('click', () => {
                    const path = el.dataset.path;
                    navigateToFolder(path || '');
                });
            });
        }

        function updateStorage() {
            const total = getTotalSize();
            const percent = getStoragePercent();
            storageText.textContent = `${formatSize(total)} / ${formatSize(MAX_STORAGE)}`;
            storageFill.style.width = `${percent}%`;
            if (percent > 90) {
                storageFill.style.background = 'linear-gradient(90deg, #f59e0b, #ef4444)';
            } else {
                storageFill.style.background = 'var(--accent-gradient)';
            }
        }

        function updateViewToggle() {
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                const view = btn.dataset.view;
                btn.classList.toggle('active', view === state.viewMode);
            });
        }

        // ================================================================
        //  MODALS
        // ================================================================
        function openUploadModal() {
            uploadModal.classList.add('open');
            fileInput.value = '';
            uploadProgress.classList.remove('show');
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';
            cancelUploadBtn.disabled = true;
            dropZone.classList.remove('dragover');
        }

        function closeUploadModalHandler() {
            if (uploadInProgress) {
                if (!confirm('Upload in progress. Cancel?')) return;
                uploadInProgress = false;
                uploadedFiles = [];
                uploadProgress.classList.remove('show');
            }
            uploadModal.classList.remove('open');
        }

        function openFolderModal() {
            folderModal.classList.add('open');
            folderNameInput.value = '';
            folderNameInput.focus();
        }

        function closeFolderModalHandler() {
            folderModal.classList.remove('open');
        }

        // ================================================================
        //  TOASTS
        // ================================================================
        function toast(message, type = 'info') {
            const container = toastContainer;
            const toastEl = document.createElement('div');
            const icon = type === 'error' ? 'fa-exclamation-circle' :
                type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
            toastEl.className = `toast ${type}`;
            toastEl.innerHTML = `
                <i class="fas ${icon}"></i>
                <span>${message}</span>
                <button class="toast-close"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(toastEl);

            toastEl.querySelector('.toast-close').addEventListener('click', () => {
                toastEl.remove();
            });

            setTimeout(() => {
                toastEl.style.opacity = '0';
                toastEl.style.transform = 'translateX(20px)';
                setTimeout(() => toastEl.remove(), 300);
            }, 4500);
        }

        // ================================================================
        //  SIDEBAR TOGGLE
        // ================================================================
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        }

        // ================================================================
        //  THEME
        // ================================================================
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('cloudvault_theme', next);
            const icon = themeToggle.querySelector('i');
            icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        function loadTheme() {
            const saved = localStorage.getItem('cloudvault_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            const icon = themeToggle.querySelector('i');
            icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            loadTheme();

            // Check for existing session
            const session = localStorage.getItem('cloudvault_session');
            if (session) {
                try {
                    const user = JSON.parse(session);
                    currentUser = user;
                    loadState();
                    render();
                    updateUserUI();
                    toggleAuthScreen(false);
                } catch (e) {
                    // invalid session
                    localStorage.removeItem('cloudvault_session');
                }
            } else {
                // Show auth
                toggleAuthScreen(true);
                loadState(); // load guest data if any
                render();
            }

            // ---- Event binding ----

            // Hamburger
            hamburgerBtn.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);

            // Sidebar nav
            document.querySelectorAll('.sidebar-nav .nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-nav .nav-item').forEach(b => b.classList.remove(
                        'active'));
                    btn.classList.add('active');
                    state.filterType = btn.dataset.view;
                    render();
                    closeSidebar();
                });
            });

            // Sidebar actions
            document.getElementById('uploadBtnSidebar').addEventListener('click', openUploadModal);
            document.getElementById('newFolderBtnSidebar').addEventListener('click', openFolderModal);

            // Upload modal
            closeUploadModal.addEventListener('click', closeUploadModalHandler);
            uploadModal.addEventListener('click', (e) => {
                if (e.target === uploadModal) closeUploadModalHandler();
            });

            // Drop zone
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    uploadFiles(e.dataTransfer.files);
                }
            });
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) {
                    uploadFiles(fileInput.files);
                }
            });
            cancelUploadBtn.addEventListener('click', () => {
                if (uploadInProgress) {
                    if (confirm('Cancel upload?')) {
                        uploadInProgress = false;
                        uploadedFiles = [];
                        uploadProgress.classList.remove('show');
                        toast('Upload cancelled.', 'info');
                    }
                }
            });

            // Folder modal
            closeFolderModal.addEventListener('click', closeFolderModalHandler);
            folderModal.addEventListener('click', (e) => {
                if (e.target === folderModal) closeFolderModalHandler();
            });
            cancelFolderBtn.addEventListener('click', closeFolderModalHandler);
            createFolderBtn.addEventListener('click', () => {
                const name = folderNameInput.value.trim();
                if (createFolder(name)) {
                    closeFolderModalHandler();
                }
            });
            folderNameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') createFolderBtn.click();
                if (e.key === 'Escape') closeFolderModalHandler();
            });

            // View toggle
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.viewMode = btn.dataset.view;
                    render();
                });
            });

            // Search
            let searchTimeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    state.searchQuery = searchInput.value;
                    render();
                }, 250);
            });

            // Theme toggle
            themeToggle.addEventListener('click', toggleTheme);

            // Logout
            logoutBtn.addEventListener('click', handleLogout);

            // Auth events
            authSubmitBtn.addEventListener('click', handleAuthSubmit);
            authToggleBtn.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                authSubtitle.textContent = isLoginMode ? 'Sign in to access your secure vault' :
                    'Create a new account to get started';
                authBtnText.textContent = isLoginMode ? 'Sign In' : 'Create Account';
                authToggleBtn.textContent = isLoginMode ? 'Create an account →' : '← Back to sign in';
                authError.textContent = '';
            });
            authGuestBtn.addEventListener('click', handleGuestLogin);

            // Enter key for auth
            authPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') authSubmitBtn.click();
            });
            authUsername.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') authPassword.focus();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (uploadModal.classList.contains('open')) closeUploadModalHandler();
                    if (folderModal.classList.contains('open')) closeFolderModalHandler();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                    e.preventDefault();
                    openUploadModal();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    openFolderModal();
                }
            });

            console.log('🚀 CloudVault initialized (local)');
            console.log(`📦 ${state.files.length} files, ${state.folders.length} folders`);
            console.log(`💾 ${formatSize(getTotalSize())} used`);
        }

        // ================================================================
        //  START
        // ================================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
